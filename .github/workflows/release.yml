name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Package and Deploy Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Environment Build Tools
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies & Build Binaries
        run: |
          npm ci
          npm run build
          npm run pkg

      - name: Compress Release Artifacts
        run: gzip -c pkg/sixtyeight > pkg/sixtyeight-linux-amd64.gz

      - name: Generate Draft GitHub Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" pkg/sixtyeight-linux-amd64.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release $TAG_NAME" \
            --generate-notes \
            --draft=false
