name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Package and Deploy Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Environment Build Tools
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies & Build Binaries
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          npm install -g @yao-pkg/pkg
          npm ci
          npm pkg set version="${TAG_NAME#v}"
          npm run version:sync
          npm run build
          npm prune --omit=dev
          npm run pkg

      - name: Compress Release Artifacts
        run: |
          cd pkg
          gzip -c sixtyeight-linux > sixtyeight-linux-amd64.gz
          zip sixtyeight-win-amd64.zip sixtyeight-win.exe

      - name: Generate Draft GitHub Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            pkg/sixtyeight-linux-amd64.gz pkg/sixtyeight-win-amd64.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release $TAG_NAME" \
            --generate-notes \
            --draft=false
